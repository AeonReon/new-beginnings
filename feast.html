<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4FA4D2">
  <title>Conscious Parenting NI — This Week's Feast</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main>
    <header class="feast-hero">
      <div class="feast-hero-eyebrow"><span id="week-pill">Week 1</span></div>
      <h1>This Week's Feast</h1>
      <p class="lede">Seven small things to choose from this week — a poem, a hymn, a piece of music, a painting, a story, a nature prompt, a small piece of practical life. Do one. Do all. Do none. Then hit Next when you want a new one.</p>
    </header>

    <button id="read-btn" class="read-btn" style="margin-bottom: 1em;">▶ Read aloud</button>

    <div id="feast-root"></div>

    <div class="feast-nav">
      <button class="secondary" id="prev">← Previous week</button>
      <button id="next">Next week →</button>
    </div>
  </main>

  <script src="assets/feast-data.js"></script>
  <script src="assets/app.js"></script>
  <script src="assets/reader.js"></script>
  <script>
    const KEY = 'nb.feastWeek';
    let currentWeek = parseInt(localStorage.getItem(KEY) || '1', 10);
    if (currentWeek < 1 || currentWeek > 52) currentWeek = 1;

    document.getElementById('prev').addEventListener('click', () => {
      currentWeek = currentWeek > 1 ? currentWeek - 1 : 52;
      saveWeek();
      render();
    });
    document.getElementById('next').addEventListener('click', () => {
      currentWeek = currentWeek < 52 ? currentWeek + 1 : 1;
      saveWeek();
      render();
    });

    function saveWeek() {
      try { localStorage.setItem(KEY, String(currentWeek)); } catch {}
    }

    function searchLinks(query) {
      const q = encodeURIComponent(query);
      return `
        <div class="links">
          <a href="https://www.google.com/search?q=${q}" target="_blank" rel="noopener">Google</a>
          <a href="https://www.youtube.com/results?search_query=${q}" target="_blank" rel="noopener">YouTube</a>
          <a href="https://www.gutenberg.org/ebooks/search/?query=${q}" target="_blank" rel="noopener">Gutenberg</a>
          <a href="https://librivox.org/search?q=${q}&search_form=advanced" target="_blank" rel="noopener">LibriVox</a>
        </div>
      `;
    }

    function section(title, kind, bodyHtml) {
      return `
        <div class="feast-section">
          <h3>${title} <span class="kind">${kind}</span></h3>
          ${bodyHtml}
        </div>
      `;
    }

    function render() {
      const w = currentWeek;
      const f = FEAST[w - 1];
      if (!f) return;

      const term = TERM_OF_WEEK(w);
      const composer = COMPOSER_OF_WEEK(w);
      const artist = ARTIST_OF_WEEK(w);
      const month = MONTH_OF_WEEK(w);
      const hymn = HYMNS[month];
      const virtue = VIRTUES[month];

      document.getElementById('week-pill').textContent =
        `Week ${w} · ${term.charAt(0).toUpperCase() + term.slice(1)} term`;

      const root = document.getElementById('feast-root');

      const poemBody = f.poem.body
        ? `<div class="poem-body">${f.poem.body}</div>`
        : `<p><em>Text omitted (copyright or length). Find it in the sources below.</em></p>`;

      root.innerHTML = `
        <div class="virtue-card">
          <div class="virtue-eyebrow">This month's virtue</div>
          <div class="virtue-name">${virtue.name}</div>
          <p>${virtue.why}</p>
        </div>

        ${section(
          f.poem.title,
          `Poem · ${f.poem.author}`,
          `${poemBody}
           <p class="why">${f.poem.why}</p>
           ${searchLinks(f.poem.title + ' ' + f.poem.author)}`
        )}

        ${section(
          hymn.title,
          `Hymn`,
          `<p><em>${hymn.origin}</em></p>
           <p class="why">${hymn.note}</p>
           ${searchLinks(hymn.title + ' hymn')}`
        )}

        ${section(
          f.composer_piece.title,
          `Composer · ${composer.name}`,
          `<p>${f.composer_piece.note}</p>
           <p class="why">${composer.why}</p>
           ${searchLinks(composer.name + ' ' + f.composer_piece.title)}`
        )}

        ${section(
          f.artist_work.title,
          `Painting · ${artist.name}`,
          `<p>${f.artist_work.note}</p>
           <p class="why">${artist.why}</p>
           ${searchLinks(artist.name + ' ' + f.artist_work.title)}`
        )}

        ${section(
          f.story.title,
          `Story · ${f.story.kind} · ${f.story.source}`,
          `<p>${f.story.summary}</p>
           ${searchLinks(f.story.title + ' ' + f.story.source)}`
        )}

        ${section(
          f.nature.prompt,
          'Nature prompt',
          `<p class="why">${f.nature.why}</p>`
        )}

        ${section(
          f.practical_life.title,
          'Practical life',
          `<p class="why">${f.practical_life.why}</p>`
        )}
      `;
    }

    render();

    document.getElementById('read-btn').addEventListener('click', () => {
      if (window.Reader.speaking) {
        window.Reader.stop();
      } else {
        window.Reader.readElement(document.querySelector('main'));
      }
    });
  </script>
</body>
</html>
