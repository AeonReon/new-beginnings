<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#fde68a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky background, rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#sky)"/>

  <!-- Soft horizon haze -->
  <rect x="0" y="312" width="512" height="200" fill="#bfdbfe" opacity="0.4"/>

  <!-- Sun glow -->
  <circle cx="256" cy="332" r="180" fill="url(#glow)"/>

  <!-- Rising sun (half disc above horizon) -->
  <path d="M 116 332 A 140 140 0 0 1 396 332 Z" fill="url(#sun)"/>

  <!-- Sun rays - short, only above horizon -->
  <g stroke="#f59e0b" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="120" x2="256" y2="160"/>
    <line x1="156" y1="160" x2="178" y2="192"/>
    <line x1="356" y1="160" x2="334" y2="192"/>
    <line x1="92" y1="240" x2="128" y2="252"/>
    <line x1="420" y1="240" x2="384" y2="252"/>
  </g>

  <!-- Horizon line -->
  <line x1="56" y1="332" x2="456" y2="332" stroke="#1e40af" stroke-width="7" stroke-linecap="round"/>

  <!-- Two small hills below horizon for depth -->
  <path d="M 56 332 Q 160 372 280 348 Q 380 328 456 360 L 456 456 L 56 456 Z" fill="#1d4ed8" opacity="0.85"/>
  <path d="M 56 380 Q 200 410 360 388 Q 420 380 456 400 L 456 456 L 56 456 Z" fill="#1e3a8a"/>
</svg>
